name: Automated Dependency Updates

on:
  schedule:
    - cron: '0 0 * * 4' # Every Thursday at midnight
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: 'npm'

      - name: Update dependencies
        run: |
          npx npm-check-updates --target minor -u
          npm install

      - name: Build project
        run: npm run build:pwa

      - name: Run tests
        run: npm test

      - name: Commit and push changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated security and dependency updates"
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Create Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner,
              repo,
              title: '❌ Automated Dependency Update Failed',
              body: `The automated dependency update failed during the build or test phase.\n\n[View Workflow Run](${runUrl})\n\nPlease check the logs and manually resolve any breaking changes.`
            });
