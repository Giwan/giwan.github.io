<svg width="500" height="250" viewBox="0 0 500 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagram showing the separation of Domain Narrative and Framework Glue">
  <rect width="500" height="250" rx="12" fill="#fafafa" stroke="#e5e5e5" />
  <circle cx="250" cy="125" r="70" fill="#a855f7" stroke="#18181b" stroke-dasharray="4 4" opacity="0.6" />
  <text x="250" y="120" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#18181b">The Business Logic</text>
  <text x="250" y="140" text-anchor="middle" font-family="serif" font-size="12" fill="#18181b" opacity="0.7">(Domain Core)</text>
  <rect x="40" y="100" width="100" height="50" rx="4" fill="#fafafa" stroke="#18181b" />
  <text x="90" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#18181b">React Adapter</text>
  <path d="M140 125 L180 125" stroke="#18181b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <rect x="360" y="100" width="100" height="50" rx="4" fill="#fafafa" stroke="#18181b" />
  <text x="410" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#18181b">CLI / API Adapter</text>
  <path d="M360 125 L320 125" stroke="#18181b" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#18181b" />
    </marker>
  </defs>
</svg>